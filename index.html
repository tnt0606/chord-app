<body class="bg-slate-100 min-h-screen text-slate-800">
  <div class="max-w-6xl mx-auto p-4 space-y-6">

          </label>
          <label class="flex items-center">
            <input type="radio" name="instrument" value="guitar" class="mr-2">
            ギター
          </label>
        </div>
      </div>
    </header>

    <section id="savedSection" class="bg-white rounded-xl shadow p-5">
      <h2 class="text-xl font-semibold text-slate-700 mb-3">保存済みリスト</h2>
      <ul id="savedList" class="space-y-2 min-h-[100px] border border-slate-200 rounded p-3"></ul>
    </section>

    <section id="availableSection" class="bg-white rounded-xl shadow p-5">
      <h2 class="text-xl font-semibold text-slate-700 mb-3">利用可能なコード一覧</h2>
      <div id="availableChords" class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-7 gap-1.5"></div>
    </section>

    <section id="myListSection" class="bg-white rounded-xl shadow p-5">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-3 gap-2">
        <h2 class="text-xl font-semibold text-slate-700">作成中のマイリスト</h2>
        <div class="flex flex-wrap gap-2">
          <button id="breakLineBtn" class="bg-sky-600 text-white px-3 py-1.5 rounded text-sm hover:bg-sky-700">改行</button>
          <button id="clearAllBtn" class="bg-red-600 text-white px-3 py-1.5 rounded text-sm hover:bg-red-700">すべて削除</button>
          <button id="saveListBtn" class="bg-indigo-600 text-white px-3 py-1.5 rounded hover:bg-indigo-700">保存</button>
          <button id="saveAsNewBtn" class="bg-green-600 text-white px-3 py-1.5 rounded hover:bg-green-700 hidden">新規保存</button>
          <button id="updateBtn" class="bg-orange-600 text-white px-3 py-1.5 rounded hover:bg-orange-700 hidden">更新</button>
        </div>
      </div>
      <ul id="myList" class="space-y-2 min-h-[160px] border border-dashed border-slate-300 rounded p-3"></ul>
      <p class="text-xs text-slate-500 mt-2">ドラッグ&ドロップで順序変更、「改行」で区切り挿入、「保存」でリスト保存。</p>
    </section>

    <section id="previewSection" class="bg-white rounded-xl shadow p-5">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-xl font-semibold text-slate-700">プレビュー</h2>
        <button id="fullscreenBtn" class="bg-purple-600 text-white px-3 py-1.5 rounded hover:bg-purple-700">全画面</button>
      </div>

          </div>
          <div id="fullscreenPreviewArea" class="grid grid-cols-5 gap-1.5"></div>
        </div>
      </div>
    </section>

    // フラット化したデータ（互換性用）

      chordData = {};

      if (inst.chordByNote) {

              const name = type ? note + type : note;
              chordData[name] = data.frets || data;
            });
          }
        });
      }

    const availableChordsEl = document.getElementById('availableChords');
    const myListEl = document.getElementById('myList');
    const savedListEl = document.getElementById('savedList');
    const previewArea = document.getElementById('previewArea');

    let myList = [];
    let editingFromIdx = null; // 読み込み元のリストインデックス（編集モード追跡用）
    let savedList = JSON.parse(localStorage.getItem('ukuleleSaved') || '[]');
    
    // データマイグレーション：古い配列形式を新しいオブジェクト形式に変換
    savedList = savedList.map(entry => {
      if (Array.isArray(entry)) {
        return { name: '名前なし', chords: entry };
      }
      return entry;
    });

    function updateSavedUI() {
      savedListEl.innerHTML = '';
      if (!savedList.length) {
        savedListEl.innerHTML = '<li class="text-slate-500">保存済みのコードがありません。</li>';
        return;
      }
      savedList.forEach((entry, idx) => {
        const li = document.createElement('li');
        li.className = 'bg-slate-50 p-2 rounded flex flex-col gap-2';
        
        let displayName = '';
        let chordCount = 0;
        let chordText = '';
        
        if (Array.isArray(entry)) {
          chordCount = entry.filter(c => c !== '---').length;
          chordText = entry.join(' ');
        } else if (entry && entry.chords) {
          displayName = entry.name ? `<strong>${entry.name}</strong>: ` : '';
          chordCount = entry.chords.filter(c => c !== '---').length;
          chordText = entry.chords.join(' ');
        }
        
        li.innerHTML = `
          <div><strong>${entry.name || '名前なし'}</strong> (${chordCount}コード)</div>
          <div class="flex flex-wrap gap-1">
            <button class="text-indigo-600 hover:underline text-sm px-2 py-1" data-load="${idx}">読み込み</button>
            <button class="text-purple-600 hover:underline text-sm px-2 py-1" data-fullscreen="${idx}">全画面</button>
            <button class="text-rose-600 hover:underline text-sm px-2 py-1" data-del="${idx}">削除</button>
          </div>
        `;
        savedListEl.appendChild(li);
      });

    function setLocalStorage() {
      localStorage.setItem('ukuleleSaved', JSON.stringify(savedList));
    }

    function renderMyList() {
      myListEl.innerHTML = '';
      
      // 編集モードのインジケーター
      if (editingFromIdx !== null) {
        const modeLabel = document.createElement('div');
        modeLabel.className = 'mb-2 text-xs text-amber-700 bg-amber-50 p-2 rounded';
        modeLabel.innerHTML = `📝 このリストは読み込み元リスト（<strong>${savedList[editingFromIdx].name}</strong>）の編集モードです。`;
        myListEl.appendChild(modeLabel);
        
        // 編集モード時はボタンを表示
        const buttonContainer = document.createElement('div');
        buttonContainer.className = 'mb-2 space-x-2';
        buttonContainer.innerHTML = `
          <button id="saveAsNewBtn" class="bg-green-600 text-white px-3 py-1.5 rounded hover:bg-green-700">新規保存</button>
          <button id="updateBtn" class="bg-orange-600 text-white px-3 py-1.5 rounded hover:bg-orange-700">更新</button>
        `;
        myListEl.appendChild(buttonContainer);
      }
      
      if (!myList.length) {
        const emptyLi = document.createElement('li');
        emptyLi.className = 'text-slate-500';
        emptyLi.textContent = 'マイリストにコードがありません。';
        myListEl.appendChild(emptyLi);
        return;
      }
      
      myList.forEach((name, idx) => {
        const li = document.createElement('li');
        if (name === '---') {
          li.className = 'bg-rose-100 rounded p-1 flex justify-between items-center cursor-move';
          li.innerHTML = `<span class="italic text-rose-600">━━━ 改行 ━━━</span><button class="text-rose-600 text-sm" data-remove="${idx}">削除</button>`;
        } else {
          li.className = 'bg-indigo-50 rounded p-2 flex justify-between items-center cursor-move';
          li.innerHTML = `<span>${name}</span><button class="text-rose-600 text-sm" data-remove="${idx}">削除</button>`;
        }
        li.draggable = true;
        li.dataset.index = idx;

        li.addEventListener('dragstart', e => {
          e.dataTransfer.setData('text/plain', idx);
          e.dataTransfer.effectAllowed = 'move';
          e.target.classList.add('opacity-50');
        });
        li.addEventListener('dragend', e => {
          e.target.classList.remove('opacity-50');
        });

        myListEl.appendChild(li);
      });
    }

    myListEl.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    });

    myListEl.addEventListener('drop', e => {
      e.preventDefault();
      const from = Number(e.dataTransfer.getData('text/plain'));
      if (Number.isNaN(from) || from < 0 || from >= myList.length) return;

      const targetLi = e.target.closest('li');
      let to = targetLi ? Number(targetLi.dataset.index) : myList.length - 1;
      if (targetLi && from < to) to = to; // no adjustment needed since splice from first then insert; but we'll handle below
      if (targetLi && from > to) to = to;
      if (!targetLi) to = myList.length;

      const moved = myList.splice(from, 1)[0];
      if (to > myList.length) to = myList.length;
      myList.splice(to, 0, moved);

      renderMyList();
      renderPreview();
    });

      if (!list.length) {
        target.innerHTML = '<p class="text-slate-500">コードがありません。</p>';
        return;
      }
      const wrapper = document.createElement('div');
      wrapper.className = 'col-span-full';
      const cardContainer = document.createElement('div');
      cardContainer.className = 'grid grid-cols-4 gap-2 pb-4';
      
      list.forEach(name => {
        if (name === '---') {
          const breakDiv = document.createElement('div');
          breakDiv.className = 'col-span-full border-t-2 border-rose-300 my-2';
          cardContainer.appendChild(breakDiv);
          return;
        }
        
        const chord = chordData[name];
        const card = document.createElement('div');
        card.className = 'bg-white p-1 rounded shadow-sm text-center flex-shrink-0';
        const title = document.createElement('div');
        title.className = 'font-semibold mb-1 text-sm';
        title.textContent = name;
        card.appendChild(title);

        const chart = document.createElement('div');
        chart.className = 'flex justify-center';
        chart.style.minHeight = '75px';
        card.appendChild(chart);

        drawChordChart(chart, name, chord);
        
        card.addEventListener('click', () => {
          playChord(name);
        });
        
        cardContainer.appendChild(card);
      });
      
      wrapper.appendChild(cardContainer);
      target.appendChild(wrapper);
    }

    function drawChordChart(container, chordName, chord) {
      container.innerHTML = '';
      const inst = instruments[currentInstrument];
      const width = inst.numStrings === 4 ? 60 : 80;
      const height = 75;
      const svgNS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgNS, 'svg');
      svg.setAttribute('viewBox', `0 0 ${width} 75`);
      svg.setAttribute('width', width.toString());
      svg.setAttribute('height', '75');
      svg.classList.add('mx-auto');

      const marginX = 6;
      const marginY = 6;
      const stringCount = inst.numStrings;
      const fretCount = inst.numFrets;
      const woodWidth = width - marginX * 2;
      const woodHeight = height - marginY * 2;

      // フレット線
      for (let f = 0; f <= fretCount; f++) {
        const y = marginY + (woodHeight / fretCount) * f;
        const line = document.createElementNS(svgNS, 'line');
        line.setAttribute('x1', marginX);
        line.setAttribute('x2', width - marginX);
        line.setAttribute('y1', y);
        line.setAttribute('y2', y);
        line.setAttribute('stroke', f === 0 ? '#444' : '#bbb');
        line.setAttribute('stroke-width', f === 0 ? 3 : 1);
        svg.appendChild(line);
      }

      // 弦線
      for (let s = 0; s < stringCount; s++) {
        const x = marginX + (woodWidth / (stringCount - 1)) * s;
        const line = document.createElementNS(svgNS, 'line');
        line.setAttribute('x1', x);
        line.setAttribute('x2', x);
        line.setAttribute('y1', marginY);
        line.setAttribute('y2', height - marginY);
        line.setAttribute('stroke', '#777');
        line.setAttribute('stroke-width', 1);
        svg.appendChild(line);

        const note = inst.tuning[s];
        const text = document.createElementNS(svgNS, 'text');
        text.setAttribute('x', x);
        text.setAttribute('y', marginY - 4);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('font-size', '8');
        text.setAttribute('fill', '#333');
        text.textContent = note;
        svg.appendChild(text);
      }

      // フレットマークとフィンガー
      const frets = chord.frets || chord; // chordが{frets:[]}形式か[]形式かを判定
      frets.forEach((fret, s) => {
        const x = marginX + (woodWidth / (stringCount - 1)) * s;
        if (fret === 'x' || fret === 'X' || fret === null) {
          const text = document.createElementNS(svgNS, 'text');
          text.setAttribute('x', x);
          text.setAttribute('y', marginY - 12);
          text.setAttribute('text-anchor', 'middle');
          text.setAttribute('font-size', '9');
          text.setAttribute('fill', '#e11d48');
          text.textContent = '✕';
          svg.appendChild(text);
          return;
        }
        if (fret === 0) {
          const text = document.createElementNS(svgNS, 'text');
          text.setAttribute('x', x);
          text.setAttribute('y', marginY - 12);
          text.setAttribute('text-anchor', 'middle');
          text.setAttribute('font-size', '9');
          text.setAttribute('fill', '#111827');
          text.textContent = '○';
          svg.appendChild(text);
          return;
        }
        if (fret > 0) {
          const y = marginY + (woodHeight / fretCount) * (fret - 0.5);
          const circle = document.createElementNS(svgNS, 'circle');
          circle.setAttribute('cx', x);
          circle.setAttribute('cy', y);
          circle.setAttribute('r', 4);
          circle.setAttribute('fill', '#4f46e5');
          svg.appendChild(circle);
        }
      });

      container.appendChild(svg);
    }

    document.getElementById('breakLineBtn').addEventListener('click', () => {
      myList.push('---');
      renderMyList();
      renderPreview();
    });

    document.getElementById('saveListBtn').addEventListener('click', () => {
      if (!myList.length) return alert('マイリストが空です。');
      
      // 編集モード時はボタン分離なので何もしない
      if (editingFromIdx !== null) return;
      
      // 新規作成の場合
      const name = prompt('このリストに名前をつけてください:');
      if (name === null) return;
      savedList.push({
        name: name || '名前なし',
        chords: [...myList]
      });
      
      setLocalStorage();
      updateSavedUI();
      alert('保存されました');
    });

    savedListEl.addEventListener('click', e => {
      if (e.target.dataset.load !== undefined) {
        const idx = Number(e.target.dataset.load);
        const entry = savedList[idx];
        myList = Array.isArray(entry) ? [...entry] : [...entry.chords];
        editingFromIdx = idx; // 編集モード有効化
        renderMyList();
        renderPreview();
      }
      if (e.target.dataset.del !== undefined) {
        const idx = Number(e.target.dataset.del);
        savedList.splice(idx, 1);
        setLocalStorage();
        updateSavedUI();
      }
      if (e.target.dataset.fullscreen !== undefined) {
        const idx = Number(e.target.dataset.fullscreen);
        const entry = savedList[idx];
        document.querySelector('#fullscreenModal h2').textContent = `${entry.name}`;
        renderPreview(entry.chords, document.getElementById('fullscreenPreviewArea'));
        document.getElementById('fullscreenModal').classList.remove('hidden');
      }
    });

    myListEl.addEventListener('click', e => {
      if (e.target.dataset.remove !== undefined) {
        const idx = Number(e.target.dataset.remove);
        myList.splice(idx, 1);
        renderMyList();
        renderPreview();
      }
    });

    let selectedBaseNote = null; // 選択中のベースノート
    
    function renderAvailable() {
      availableChordsEl.innerHTML = '';
      const inst = instruments[currentInstrument];
      
      if (selectedBaseNote === null) {
        // 段階1：ベースノート選択
        const header = document.createElement('div');
        header.className = 'col-span-full mb-2';
        header.innerHTML = `<p class="text-slate-600 text-sm">ステップ1: ベースノートを選択してください (${currentInstrument === 'ukulele' ? 'ウクレレ' : 'ギター'})</p>`;
        availableChordsEl.appendChild(header);
        
        baseNotes.forEach(note => {
          const btn = document.createElement('button');
          btn.className = 'bg-white border-2 border-slate-300 rounded-lg p-2 text-base font-bold hover:border-indigo-500 hover:bg-indigo-50 transition';
          btn.textContent = note;
          btn.addEventListener('click', () => {
            selectedBaseNote = note;
            renderAvailable();
          });
          availableChordsEl.appendChild(btn);
        });
      } else {
        // 段階2：コード種選択
        const header = document.createElement('div');
        header.className = 'col-span-full mb-3 flex items-center justify-between';
        const title = document.createElement('p');
        title.className = 'text-slate-600 font-semibold';
        title.innerHTML = `ステップ2: <strong>${selectedBaseNote}</strong> のコード種を選択`;
        const backBtn = document.createElement('button');
        backBtn.className = 'bg-slate-400 text-white px-3 py-1 rounded text-sm hover:bg-slate-500';
        backBtn.textContent = '戻る';
        backBtn.addEventListener('click', () => {
          selectedBaseNote = null;
          renderAvailable();
        });
        header.appendChild(title);
        header.appendChild(backBtn);
        availableChordsEl.appendChild(header);
        
        // コード種を表示
        chordTypeOrder.forEach(type => {
          if (inst.chordByNote[selectedBaseNote] && inst.chordByNote[selectedBaseNote][type]) {
            const frets = inst.chordByNote[selectedBaseNote][type];
            const chordName = type ? selectedBaseNote + type : selectedBaseNote;
            const card = document.createElement('article');
            card.className = 'bg-white rounded-lg p-2 border border-slate-200 shadow-sm flex flex-col gap-2 cursor-pointer hover:shadow-md hover:border-indigo-400 transition';

            const title = document.createElement('h3');
            title.className = 'font-medium text-slate-700 text-center text-sm';
            title.textContent = chordName;
            
            const typeLabel = document.createElement('p');
            typeLabel.className = 'text-xs text-slate-500 text-center';
            typeLabel.textContent = `${chordTypes[type] || 'Major'}`;

            const preview = document.createElement('div');
            preview.className = 'h-16 flex items-center justify-center hover:bg-indigo-50 rounded transition';
            drawChordChart(preview, chordName, frets);

            card.addEventListener('click', () => {
              playChord(chordName);
              myList.push(chordName);
              renderMyList();
              renderPreview();
              selectedBaseNote = null;
              renderAvailable();
            });

            card.append(title, typeLabel, preview);
            availableChordsEl.appendChild(card);
          }
        });
      }
    }

    // フレットから周波数を計算
    function getFrequency(stringIndex, fret) {
      const inst = instruments[currentInstrument];
      return inst.tuningFreq[stringIndex] * Math.pow(2, fret / 12);
    }

    // コードの音を再生
    function playChord(chordName) {
      const chord = chordData[chordName];
      if (!chord || !chord.frets) return;

      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const now = audioCtx.currentTime;

      chord.frets.forEach((fret, stringIndex) => {
        if (fret !== 'x' && fret !== 'X' && fret !== null && fret >= 0) {
          const freq = getFrequency(stringIndex, fret);
          const oscillator = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();

          oscillator.connect(gainNode);
          gainNode.connect(audioCtx.destination);

          oscillator.frequency.setValueAtTime(freq, now);
          oscillator.type = 'triangle'; // より自然な音

          gainNode.gain.setValueAtTime(0.05, now);
          gainNode.gain.exponentialRampToValueAtTime(0.01, now + 1); // フェードアウト

          oscillator.start(now);
          oscillator.stop(now + 1);
        }
      });
    }

    // 全画面ボタン
    document.getElementById('fullscreenBtn').addEventListener('click', () => {
      document.querySelector('#fullscreenModal h2').textContent = 'プレビュー';
      const modal = document.getElementById('fullscreenModal');
      const fullscreenArea = document.getElementById('fullscreenPreviewArea');
      fullscreenArea.innerHTML = document.getElementById('previewArea').innerHTML;
      modal.classList.remove('hidden');
    });

    // 閉じるボタン
    document.getElementById('closeFullscreenBtn').addEventListener('click', () => {
      document.getElementById('fullscreenModal').classList.add('hidden');
    });

    // モーダル外クリックで閉じる
    document.getElementById('fullscreenModal').addEventListener('click', (e) => {
      if (e.target.id === 'fullscreenModal') {
        document.getElementById('fullscreenModal').classList.add('hidden');
      }
    });

    // すべて削除ボタン
    document.getElementById('clearAllBtn').addEventListener('click', () => {
      if (!myList.length) return alert('マイリストが空です。');
      if (confirm('マイリストのすべてのコードを削除しますか？')) {
        myList = [];
        renderMyList();
        renderPreview();
      }
    });

    // 新規保存ボタン（編集モード時）
    document.addEventListener('click', e => {
      if (e.target.id === 'saveAsNewBtn') {
        if (!myList.length) return alert('マイリストが空です。');
        const name = prompt('新しいリストに名前をつけてください:');
        if (name === null) return;
        savedList.push({
          name: name || '名前なし',
          chords: [...myList]
        });
        setLocalStorage();
        updateSavedUI();
        editingFromIdx = null;
        renderMyList();
        alert('新規保存されました');
      }
    });

    // 更新ボタン（編集モード時）
    document.addEventListener('click', e => {
      if (e.target.id === 'updateBtn') {
        if (!myList.length) return alert('マイリストが空です。');
        const originalName = savedList[editingFromIdx].name;
        const newName = prompt('このリストの名前を入力してください:', originalName);
        if (newName === null) return;
        savedList[editingFromIdx] = {
          name: newName || originalName,
          chords: [...myList]
        };
        setLocalStorage();
        updateSavedUI();
        editingFromIdx = null;
        renderMyList();
        alert('更新されました');
      }
    });

    // 楽器選択イベント
    document.querySelectorAll('input[name="instrument"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
        currentInstrument = e.target.value;
        updateChordData();
        selectedBaseNote = null;
        myList = []; // 楽器変更時はリストをクリア
        renderAvailable();
        renderMyList();
        renderPreview();
      });
    });

    function init() {
      renderAvailable();
      renderMyList();
      renderPreview();
      updateSavedUI();

      if (typeof window.VConsole !== 'undefined') {
        const vConsole = new window.VConsole();
        console.log('vConsole initialized');
      }
    }

    init();
  </script>
</body>
</html>
